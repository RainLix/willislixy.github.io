<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Willis Hacker Tools</title>
<style>
body {
  margin:0;
  font-family: monospace;
  background: radial-gradient(circle at top, #020617, #000);
  color:#00ffcc;
}
.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}
h1 {
  text-align:center;
  text-shadow:0 0 10px #00ffcc;
}
.card {
  background: rgba(0,255,204,0.05);
  border:1px solid rgba(0,255,204,0.2);
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 0 15px rgba(0,255,204,0.1);
}
select,input,button {
  background:black;
  color:#00ffcc;
  border:1px solid #00ffcc;
  padding:8px;
  margin:5px;
}
button:hover {
  background:#00ffcc;
  color:black;
  cursor:pointer;
}
.time-item {
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}
</style>
</head>
<body>
<div class="container">
<h1>⚡ WILLIS HACKER TOOLS</h1>

<div class="card">
<h2>🌍 World Clock</h2>
<select id="timezoneSelect">
<option value="Asia/Tokyo">Tokyo</option>
<option value="America/New_York">New York</option>
<option value="Europe/London">London</option>
<option value="Asia/Shanghai">Shanghai</option>
</select>
<button onclick="addClock()">ADD</button>
<div id="clocks"></div>
</div>

<div class="card">
<h2>🔁 Unit Converter</h2>
<input type="number" id="inputValue" placeholder="value">
<select id="conversionType">
<option value="km_miles">KM → Miles</option>
<option value="miles_km">Miles → KM</option>
<option value="c_f">C → F</option>
<option value="f_c">F → C</option>
</select>
<button onclick="convert()">RUN</button>
<p id="result"></p>
</div>

<div class="card">
<h2>💱 Exchange Rate</h2>
<input type="number" id="currencyInput" placeholder="amount">
<select id="fromCurrency">
<option value="USD">USD</option>
<option value="JPY">JPY</option>
<option value="CNY">CNY</option>
<option value="EUR">EUR</option>
</select>
→
<select id="toCurrency">
<option value="JPY">JPY</option>
<option value="USD">USD</option>
<option value="CNY">CNY</option>
<option value="EUR">EUR</option>
</select>
<button onclick="convertCurrency()">CONVERT</button>
<p id="currencyResult"></p>
</div>

</div>

<script>
let clocks = JSON.parse(localStorage.getItem('clocks')) || [];

function addClock(){
  const tz = document.getElementById('timezoneSelect').value;
  if(!clocks.includes(tz)){
    clocks.push(tz);
    localStorage.setItem('clocks', JSON.stringify(clocks));
  }
  renderClocks();
}

function renderClocks(){
  const container = document.getElementById('clocks');
  container.innerHTML = '';
  clocks.forEach(tz=>{
    const div = document.createElement('div');
    div.className='time-item';
    div.innerHTML=`<span>${tz}</span><span id="${tz}"></span>`;
    container.appendChild(div);
  });
}

function updateTime(){
  clocks.forEach(tz=>{
    const now = new Date().toLocaleString('en-US',{timeZone:tz});
    const el = document.getElementById(tz);
    if(el) el.innerText = now;
  });
}
setInterval(updateTime,1000);
renderClocks();

function convert(){
  const val = parseFloat(document.getElementById('inputValue').value);
  const type = document.getElementById('conversionType').value;
  let result;

  switch(type){
    case 'km_miles': result = val*0.621371; break;
    case 'miles_km': result = val/0.621371; break;
    case 'c_f': result = (val*9/5)+32; break;
    case 'f_c': result = (val-32)*5/9; break;
  }
  document.getElementById('result').innerText = 'Result: '+result;
}

async function convertCurrency(){
  const amount = document.getElementById('currencyInput').value;
  const from = document.getElementById('fromCurrency').value;
  const to = document.getElementById('toCurrency').value;

  const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
  const data = await res.json();

  const rate = data.rates[to];
  const result = amount * rate;

  document.getElementById('currencyResult').innerText = `${amount} ${from} = ${result.toFixed(2)} ${to}`;
}
</script>
</body>
</html>
